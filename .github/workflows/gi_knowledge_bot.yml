# .github/workflows/gi_knowledge_bot.yml
name: GI Knowledge Bot

on:
  schedule:
    # 1日4回 (JST)
    - cron: "27 23 * * *"   # JST 08:27 (朝)
    - cron: "27 4 * * *"    # JST 13:27 (昼)
    - cron: "27 10 * * *"   # JST 19:27 (夕)
    - cron: "27 14 * * *"   # JST 23:27 (夜)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull latest changes
        run: git pull --rebase || true

      - name: Run bot
        env:
          GI_KNOWLEDGE_WEBHOOK_URL: ${{ secrets.GI_KNOWLEDGE_WEBHOOK_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python gi_knowledge_bot.py

      - name: Save posted data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posted_gi_knowledge.json || true
          git diff --staged --quiet || git commit -m "Update GI knowledge posted data [skip ci]"
          git pull --rebase || true
          git push || true
